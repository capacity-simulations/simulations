<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quantum User Versions</title>
  <meta name="description" content="User-facing versions of the quantum simulations." />
  <style>
    :root {
      --bg: #070914;
      --text: #eef2ff;
      --muted: rgba(203, 213, 255, 0.72);

      --accent: #7c3aed;     /* violet */
      --accent-2: #22d3ee;   /* cyan */
      --accent-3: #a3ffbd;   /* mint */

      --card: rgba(255, 255, 255, 0.055);
      --card-2: rgba(255, 255, 255, 0.085);
      --stroke: rgba(255, 255, 255, 0.10);
      --stroke-2: rgba(255, 255, 255, 0.16);

      --shadow: 0 18px 60px rgba(0,0,0,0.55);
      --shadow-soft: 0 12px 40px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: #070914;
      background-image:
        radial-gradient(1100px 650px at 15% -10%, rgba(124, 58, 237, 0.44) 0%, rgba(124, 58, 237, 0.0) 58%),
        radial-gradient(900px 520px at 96% 0%, rgba(34, 211, 238, 0.34) 0%, rgba(34, 211, 238, 0.0) 55%),
        radial-gradient(900px 520px at 60% 110%, rgba(163, 255, 189, 0.16) 0%, rgba(163, 255, 189, 0.0) 55%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.0) 40%),
        radial-gradient(1200px 700px at 20% 0%, rgba(23, 33, 74, 0.75) 0%, rgba(7, 9, 20, 1) 62%);
      color: var(--text);
      display: block;
      padding: clamp(16px, 3vw, 28px);
      overflow-y: auto;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 70% 55% at 50% 20%, black 20%, transparent 76%);
      opacity: 0.55;
    }
    .wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    header {
      text-align: center;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 8px;
      font-weight: 850;
      letter-spacing: -0.02em;
      font-size: clamp(1.6rem, 4.6vw, 2.35rem);
      line-height: 1.1;
    }
    p.lead {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.4;
    }
    .back-link {
      display: inline-block;
      margin: 0 0 18px;
      color: rgba(238, 242, 255, 0.8);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
    }
    .back-link:hover {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }
    .topbar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .search {
      width: min(360px, 100%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow-soft);
    }
    .search input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 0.95rem;
    }
    .search input::placeholder { color: rgba(238, 242, 255, 0.55); }
    .search:focus-within {
      border-color: rgba(34, 211, 238, 0.52);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.14), var(--shadow-soft);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
      margin-top: 18px;
      padding-bottom: 10px;
    }
    .card {
      position: relative;
      background:
        radial-gradient(900px 260px at 20% 0%, rgba(124, 58, 237, 0.22), transparent 55%),
        radial-gradient(900px 260px at 90% 0%, rgba(34, 211, 238, 0.16), transparent 55%),
        linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 18px 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 156px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.18s ease, box-shadow 0.22s ease, border-color 0.2s ease, filter 0.22s ease;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.0) 35%);
      opacity: 0.8;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--stroke-2);
      filter: saturate(1.08);
    }
    .card h2 {
      position: relative;
      font-size: 1.02rem;
      margin: 0 0 10px;
      letter-spacing: -0.01em;
      line-height: 1.15;
    }
    .card p {
      position: relative;
      color: var(--muted);
      margin: 0 0 14px;
      line-height: 1.35;
      font-size: 0.92rem;
      min-height: 1.2em;
    }
    .actions { margin-top: auto; }
    .btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: var(--accent-2);
      color: rgba(7, 9, 20, 0.92);
      font-weight: 800;
      padding: 10px 14px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      transition: transform 0.06s ease-in-out, filter 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    }
    .btn:hover {
      filter: brightness(1.06) saturate(1.06);
      box-shadow: 0 18px 34px rgba(0,0,0,0.42);
    }
    .btn:active { transform: translateY(1px) scale(0.99); }
    footer {
      text-align: center;
      margin-top: 18px;
      color: #a3b2ff88;
      font-size: 0.9rem;
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { will-change: transform; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back-link" href="../index.html">← Back to Quantum index</a>
      <div class="search">
        <input id="search" type="search" placeholder="Search simulations…" autocomplete="off" spellcheck="false" />
      </div>
    </div>
    <header>
      <h1>User Versions</h1>
      <p class="lead">User-facing versions of the quantum simulations (clean copies for sharing and embedding).</p>
    </header>

    <section class="grid" id="sim-grid">
      <!-- Cards are generated by JavaScript below -->
    </section>

    <footer>
      <span>© <span id="year"></span> • GitHub Pages</span>
    </footer>
  </main>

  <script>
    const sims = [
      "2d_wavefunction_collapse_measurement.html",
      "A(k)-vs-k-plot.html",
      "Bound_states.html",
      "Classical-vs-schrodinger-ANHARMONIC.html",
      "Classical-vs-schrodinger.html",
      "Double-slit-experiment.html",
      "Double_slit_exp_Measurement.html",
      "Finite_well_probability_plot.html",
      "Fourier-series.html",
      "Harmonic-oscillator.html",
      "Harmonic_Oscillator_High_Energies.html",
      "Hydrogen_atom_energy_spectrum.html",
      "Hydrogen_atom_wavefunctions.html",
      "Multi_Stage_Stern_Gerlach_New.html",
      "Particle-on-a-circle.html",
      "Quantum_Tunneling_Gaussian_Wave.html",
      "Quantum_tunneling_Plane_Wave.html",
      "Single_Gaussian_plot.html",
      "Spherical_harmonics_Explorer.html",
      "Spin-X-measurement-probability.html",
      "Spin_Measurement.html",
      "Time_evolution_Gaussian_Fourier-comps.html",
      "Time_evolution_Gaussian_wavepacket.html",
      "Time_evolution_QHO_v2.html",
      "Transmission_probability_plot.html",
      "Two_Gaussian_superposition.html",
      "Vector_Space_Finite_Vectors_Updated.html",
      "infinite-potential-well.html",
      "stern-gerlach-NEW.html",
      "wavefunctions-and-probability.html",
    ];

    function prettifyFilename(file) {
      const base = file.replace(/\.html$/i, "");
      return base
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    const grid = document.getElementById("sim-grid");
    sims.forEach(file => {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.title = prettifyFilename(file).toLowerCase();
      card.innerHTML = `
        <div>
          <h2>${prettifyFilename(file)}</h2>
          <p></p>
        </div>
        <div class="actions">
          <a class="btn" href="./${file}">Open <span aria-hidden="true">→</span></a>
        </div>
      `;
      grid.appendChild(card);
    });

    const searchInput = document.getElementById("search");
    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      const cards = grid.querySelectorAll(".card");
      cards.forEach(card => {
        const t = card.dataset.title || "";
        card.style.display = !q || t.includes(q) ? "" : "none";
      });
    });

    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
