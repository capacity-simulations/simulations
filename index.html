<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive Physics Simulations</title>
  <meta name="description" content="Interactive physics demos." />
  <style>
    :root {
      --bg: #070914;
      --text: #eef2ff;
      --muted: rgba(203, 213, 255, 0.72);

      --accent: #7c3aed;     /* violet */
      --accent-2: #22d3ee;   /* cyan */
      --accent-3: #a3ffbd;   /* mint */

      --card: rgba(255, 255, 255, 0.055);
      --card-2: rgba(255, 255, 255, 0.085);
      --stroke: rgba(255, 255, 255, 0.10);
      --stroke-2: rgba(255, 255, 255, 0.16);

      --shadow: 0 18px 60px rgba(0,0,0,0.55);
      --shadow-soft: 0 12px 40px rgba(0,0,0,0.45);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: #070914;
      background-image:
        radial-gradient(1100px 650px at 15% -10%, rgba(124, 58, 237, 0.44) 0%, rgba(124, 58, 237, 0.0) 58%),
        radial-gradient(900px 520px at 96% 0%, rgba(34, 211, 238, 0.34) 0%, rgba(34, 211, 238, 0.0) 55%),
        radial-gradient(900px 520px at 60% 110%, rgba(163, 255, 189, 0.16) 0%, rgba(163, 255, 189, 0.0) 55%),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.0) 40%),
        radial-gradient(1200px 700px at 20% 0%, rgba(23, 33, 74, 0.75) 0%, rgba(7, 9, 20, 1) 62%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 3vw, 28px);
      overflow-y: auto;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(ellipse 70% 55% at 50% 20%, black 20%, transparent 76%);
      opacity: 0.55;
    }
    .wrap {
      width: 100%;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }
    header {
      text-align: center;
      margin-bottom: 36px;
    }
    h1 {
      margin: 0 0 12px;
      font-weight: 850;
      letter-spacing: -0.02em;
      font-size: clamp(1.7rem, 4.8vw, 2.45rem);
      line-height: 1.1;
    }
    p.lead {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }
    .card {
      position: relative;
      background:
        radial-gradient(900px 260px at 20% 0%, rgba(124, 58, 237, 0.22), transparent 55%),
        radial-gradient(900px 260px at 90% 0%, rgba(34, 211, 238, 0.16), transparent 55%),
        linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 180px;
      box-shadow: var(--shadow-soft);
      transition: transform 0.18s ease, box-shadow 0.22s ease, border-color 0.2s ease, filter 0.22s ease;
      overflow: hidden;
    }
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.0) 35%);
      opacity: 0.8;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
      border-color: var(--stroke-2);
      filter: saturate(1.08);
    }
    .card h2 {
      font-size: 1.3rem;
      margin: 0 0 10px;
      position: relative;
      letter-spacing: -0.01em;
    }
    .card p {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.4;
      font-size: 0.95rem;
    }
    .actions {
      margin-top: auto;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      background: var(--accent-2);
      color: rgba(7, 9, 20, 0.92);
      font-weight: 800;
      padding: 12px 18px;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      transition: transform 0.06s ease-in-out, filter 0.18s ease, box-shadow 0.18s ease;
      user-select: none;
      box-shadow: 0 14px 28px rgba(0,0,0,0.35);
    }
    .btn:hover {
      filter: brightness(1.06) saturate(1.06);
      box-shadow: 0 18px 34px rgba(0,0,0,0.42);
    }
    .btn:active {
      transform: translateY(1px) scale(0.99);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(163, 255, 189, 0.14);
      color: rgba(163, 255, 189, 0.95);
      border: 1px solid rgba(163, 255, 189, 0.22);
      font-weight: 700;
      font-size: 0.75rem;
      margin-left: 10px;
      vertical-align: middle;
    }
    footer {
      text-align: center;
      margin-top: 32px;
      color: #a3b2ff88;
      font-size: 0.9rem;
    }

    @media (prefers-reduced-motion: no-preference) {
      .card { will-change: transform; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Interactive Physics Visualizations</h1>
      <p class="lead">Explore quantum mechanics and wave phenomena through interactive simulations</p>
    </header>

    <section class="grid">
      <article class="card">
        <div>
          <h2>Quantum Mechanics</h2>
        </div>
        <div class="actions">
          <a class="btn" href="./Capacity_Quantum_simulations/">QM simulations</a>
        </div>
      </article>

      <article class="card">
        <div>
          <h2>Special Relativity<span class="badge">NEW</span></h2>
        </div>
        <div class="actions">
          <a class="btn" href="./Capacity_SR_simulations/">SR simulations</a>
        </div>
      </article>

    </section>

    <footer>
      <span>© <span id="year"></span> • GitHub Pages</span>
    </footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
