<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capacity: Introduction to Quantum Mechanics Simulations</title>
  <meta name="description" content="Interactive physics demos." />
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a33;
      --text: #e8ecff;
      --muted: #9fb1ffcc;
      --accent: #7aa2ff;
      --accent-2: #9bffcf;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: radial-gradient(1200px 700px at 20% 0%, #17214a 0%, var(--bg) 60%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      width: 100%;
      max-width: 900px;
    }
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    p.lead {
      margin: 0;
      color: var(--muted);
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 22px;
    }
    .card {
      background: linear-gradient(180deg, #162049 0%, var(--panel) 100%);
      border: 1px solid #24305f;
      border-radius: 18px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 150px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.45);
      border-color: #3953a3;
    }
    .card h2 {
      font-size: 1.1rem;
      margin: 0 0 8px;
    }
    .card p {
      color: var(--muted);
      margin: 0 0 14px;
      line-height: 1.35;
      font-size: 0.95rem;
    }
    .actions {
      margin-top: auto;
    }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(180deg, var(--accent) 0%, #547eea 100%);
      color: #0b1020;
      font-weight: 700;
      padding: 10px 14px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.04s ease-in-out;
      user-select: none;
    }
    .btn:hover {
      filter: brightness(1.1);
    }
    .btn:active {
      transform: translateY(1px);
    }
    footer {
      text-align: center;
      margin-top: 18px;
      color: #a3b2ff88;
      font-size: 0.9rem;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent-2), #5dd4a8);
      color: #002a1d;
      font-weight: 700;
      font-size: 0.72rem;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- <a class="back-link" href="../">← Back to all versions</a> -->
    
    <header>
      <h1>Capacity Physics Simulations</h1>
    </header>

    <section class="grid" id="sim-grid">
      <!-- Cards are generated by JavaScript below -->
    </section>

    <footer>
      <span>© <span id="year"></span> • GitHub Pages</span>
    </footer>
  </main>

  <script>
    // ============================================================
    // SIMULATION CONFIG - edit this array to add/remove sims!
    // ============================================================
    // All lecture sims in this folder (root only; see old/ for archived copies)
    const sims = [
      { file: "L02_Single_Gaussian_plot.html", title: "L02: Single Gaussian plot (Supplement)", desc: "" },
      { file: "L02_Two_Gaussian_superposition.html", title: "L02: Two Gaussian superposition", desc: "" },
      { file: "L03_classical-vs-schrodinger.html", title: "L03: Classical vs Schrödinger", desc: "" },
      { file: "L03_classical-vs-schrodinger-ANHARMONIC.html", title: "L03: Classical vs Schrödinger (anharmonic)", desc: "" },
      { file: "L04_double-slit-experiment.html", title: "L04: Double-slit experiment", desc: "" },
      { file: "L05_particle-on-a-circle.html", title: "L05: Particle on a circle", desc: "" },
      { file: "L06_A(k)-vs-k-plot.html", title: "L06: A(k) vs k (Supplement)", desc: "" },
      { file: "L06_Time_evolution_Gaussian_wavepacket.html", title: "L06: Time evolution of a Gaussian wavepacket", desc: "" },
      { file: "L07_harmonic-oscillator.html", title: "L07: Harmonic oscillator", desc: "" },
      { file: "L07_Harmonic_Oscillator_High_Energies.html", title: "L07: Harmonic oscillator high energies", desc: "" },
      { file: "L08_Bound_states.html", title: "L08: Bound states", desc: "" },
      { file: "L08_Finite_well_probability_plot.html", title: "L08: Even/Odd Bound states (Supplement)", desc: "" },
      { file: "L09_Transmission_probability_plot.html", title: "L09: Transmission probability", desc: "" },
      { file: "L09_Quantum_Tunneling_Gaussian_Wave.html", title: "L09: Quantum tunneling (Gaussian wave)", desc: "" },
      { file: "L09_Quantum_tunneling_Plane_Wave.html", title: "L09: Quantum tunneling (plane wave) (Supplement)", desc: "" },
      { file: "L13_Fourier-series.html", title: "L13: Fourier series", desc: "" },
      { file: "L15_2d_wavefunction_collapse_measurement.html", title: "L15: 2D wavefunction collapse & measurement", desc: "" },
      { file: "L16_Spin_Measurement.html", title: "L16: Spin measurement (Supplement)", desc: "" },
      { file: "L16_Spin-X-measurement-probability.html", title: "L16: Spin-x measurement probability", desc: "" },
      { file: "L19_Spherical_harmonics_Explorer.html", title: "L19: Spherical harmonics explorer", desc: "" },
      { file: "L21_Hydrogen_atom_wavefunctions.html", title: "L21: Hydrogen atom wavefunctions", desc: "" },
      { file: "L22_Hydrogen_atom_energy_spectrum.html", title: "L22: Hydrogen atom energy spectrum", desc: "" },
    ];
      
    // Generate cards from config
    const grid = document.getElementById('sim-grid');
    sims.forEach(sim => {
      const card = document.createElement('article');
      card.className = 'card';
      card.innerHTML = `
        <div>
          <h2>${sim.title}</h2>
          <p>${sim.desc}</p>
        </div>
        <div class="actions">
          <a class="btn" href="./${sim.file}">Open</a>
        </div>
      `;
      grid.appendChild(card);
    });

    // Set year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
