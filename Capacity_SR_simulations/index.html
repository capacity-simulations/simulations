<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Capacity~Introduction to Special Relativity Simulations</title>
  <meta name="description" content="Interactive special relativity physics simulations." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070b18;
      --bg-elevated: #0e1529;
      --panel: #131c38;
      --panel-hover: #1a2648;
      --text: #eef1ff;
      --muted: #94a3c8;
      --accent: #6ea8ff;
      --accent-glow: rgba(110, 168, 255, 0.35);
      --accent-2: #5eead4;
      --accent-2-glow: rgba(94, 234, 212, 0.25);
      --v1: #fbbf24;
      --v1-glow: rgba(251, 191, 36, 0.2);
      --v2: #67e8f9;
      --v2-glow: rgba(103, 232, 249, 0.2);
      --radius: 20px;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background */
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59, 100, 200, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(94, 234, 212, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 50% 35% at 0% 80%, rgba(110, 168, 255, 0.1) 0%, transparent 45%);
    }
    body::after {
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 75%);
    }

    main {
      position: relative;
      z-index: 1;
      flex: 1;
      width: 100%;
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 24px 16px;
      display: flex;
      flex-direction: column;
    }

    main.mode-landing {
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .content {
      width: 100%;
    }

    main.mode-landing .content {
      max-width: 720px;
    }

    .view {
      display: none;
      animation: fadeOut 0.2s ease forwards;
    }
    .view.active {
      display: block;
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      to { opacity: 0; }
    }

    /* Landing */
    .landing-hero {
      text-align: center;
      margin-bottom: 40px;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-2);
      background: rgba(94, 234, 212, 0.1);
      border: 1px solid rgba(94, 234, 212, 0.2);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4.5vw, 2.1rem);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }

    h1 .tilde {
      color: var(--accent-2);
      font-weight: 600;
    }

    .hero-sub {
      margin: 14px auto 0;
      max-width: 420px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.55;
    }

    .version-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media (max-width: 560px) {
      .version-grid { grid-template-columns: 1fr; }
    }

    .version-box {
      position: relative;
      background: linear-gradient(165deg, var(--panel-hover) 0%, var(--panel) 45%, var(--bg-elevated) 100%);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: var(--radius);
      padding: 32px 28px 28px;
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: inherit;
      width: 100%;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.25s ease, border-color 0.2s ease;
    }

    .version-box::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .version-box[data-target="view-v1"]::before {
      background: radial-gradient(circle at 80% 0%, var(--v1-glow), transparent 55%);
    }
    .version-box[data-target="view-v2"]::before {
      background: radial-gradient(circle at 80% 0%, var(--v2-glow), transparent 55%);
    }

    .version-box:hover {
      transform: translateY(-4px);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.5);
    }

    .version-box:hover::before { opacity: 1; }

    .version-box:active { transform: translateY(-2px); }

    .version-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      margin-bottom: 18px;
    }

    .version-box[data-target="view-v1"] .version-icon {
      background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.25);
    }
    .version-box[data-target="view-v2"] .version-icon {
      background: rgba(103, 232, 249, 0.12);
      border: 1px solid rgba(103, 232, 249, 0.25);
    }

    .version-box h2 {
      margin: 0 0 8px;
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .version-box[data-target="view-v1"] h2 { color: var(--v1); }
    .version-box[data-target="view-v2"] h2 { color: var(--v2); }

    .version-box p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      max-width: 28ch;
    }

    .version-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    .version-count {
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .version-box[data-target="view-v1"] .version-count {
      background: rgba(251, 191, 36, 0.15);
      color: #fcd34d;
    }
    .version-box[data-target="view-v2"] .version-count {
      background: rgba(103, 232, 249, 0.15);
      color: #a5f3fc;
    }

    .version-arrow {
      font-size: 1.25rem;
      color: var(--muted);
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .version-box:hover .version-arrow {
      transform: translateX(4px);
      color: var(--text);
    }

    /* List views */
    .view-header {
      margin-bottom: 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
      background: rgba(110, 168, 255, 0.08);
      border: 1px solid rgba(110, 168, 255, 0.2);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .back-link:hover {
      background: rgba(110, 168, 255, 0.15);
      border-color: rgba(110, 168, 255, 0.35);
    }

    .view-header h2 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .view-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(165deg, var(--panel-hover) 0%, var(--panel) 100%);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      min-height: 148px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      transition: transform 0.18s ease, box-shadow 0.2s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(110, 168, 255, 0.3);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(110, 168, 255, 0.08);
    }

    .card h3 {
      font-size: 1.02rem;
      font-weight: 600;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }

    .card p {
      color: var(--muted);
      margin: 0 0 16px;
      line-height: 1.45;
      font-size: 0.88rem;
      flex: 1;
    }

    .actions { margin-top: auto; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      background: linear-gradient(180deg, #7eb3ff 0%, #5b8def 100%);
      color: #0a1020;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 9px 16px;
      border-radius: 10px;
      transition: filter 0.15s ease, transform 0.1s ease;
    }

    .btn:hover { filter: brightness(1.08); }
    .btn:active { transform: scale(0.98); }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px 24px 28px;
      color: rgba(148, 163, 184, 0.5);
      font-size: 0.82rem;
    }

    main.mode-landing + footer {
      padding-top: 0;
    }
  </style>
</head>
<body>
  <main id="main" class="mode-landing">
    <div class="content">
      <!-- Landing -->
      <section class="view active" id="view-landing">
        <header class="landing-hero">
          <span class="eyebrow">Interactive Physics</span>
          <h1>Capacity<span class="tilde">~</span>Introduction to Special Relativity Simulations</h1>
          <p class="hero-sub">Explore classical precursors and relativistic effects through hands-on visualizations.</p>
        </header>
        <div class="version-grid">
          <button type="button" class="version-box" data-target="view-v1" aria-label="Open Sims v1">
            <div class="version-icon" aria-hidden="true">◈</div>
            <h2>Sims v1</h2>
            <p>Original interactive demos from the first release.</p>
            <div class="version-footer">
              <span class="version-count" id="v1-count"></span>
              <span class="version-arrow" aria-hidden="true">→</span>
            </div>
          </button>
          <button type="button" class="version-box" data-target="view-v2" aria-label="Open Sims v2">
            <div class="version-icon" aria-hidden="true">✦</div>
            <h2>Sims v2</h2>
            <p>Refined simulations with updated visuals and pedagogy.</p>
            <div class="version-footer">
              <span class="version-count" id="v2-count"></span>
              <span class="version-arrow" aria-hidden="true">→</span>
            </div>
          </button>
        </div>
      </section>

      <!-- Sims v1 -->
      <section class="view" id="view-v1">
        <div class="view-header">
          <button type="button" class="back-link" data-target="view-landing">← Back to home</button>
          <h2>Sims v1</h2>
          <p>Original special relativity simulations</p>
        </div>
        <section class="grid" id="grid-v1"></section>
      </section>

      <!-- Sims v2 -->
      <section class="view" id="view-v2">
        <div class="view-header">
          <button type="button" class="back-link" data-target="view-landing">← Back to home</button>
          <h2>Sims v2</h2>
          <p>Updated special relativity simulations</p>
        </div>
        <section class="grid" id="grid-v2"></section>
      </section>
    </div>
  </main>

  <footer>
    <span>© <span id="year"></span> • GitHub Pages</span>
  </footer>

  <script>
    const simsV1 = [
      { file: "old_sims/Einstien_s_Train_Paradox_refined_1.html", title: "Einstein's Train (Refined)", desc: "Relativity of simultaneity on a moving train — refined interactive version." },
      { file: "old_sims/Galilean transformations_refined_1.html", title: "Galilean Transformations", desc: "Compare classical velocity addition before Einstein's postulates." },
      { file: "old_sims/Length_contraction_refined_2.html", title: "Length Contraction", desc: "See how objects shorten along the direction of motion at high speed." },
      { file: "old_sims/Light_clock_refined_1.html", title: "Light Clock", desc: "A bouncing photon clock illustrates why moving clocks run slow." },
      { file: "old_sims/Mass_correction_refined_1.html", title: "Relativistic Mass Correction", desc: "Explore how effective mass increases as speed approaches c." },
      { file: "old_sims/Mass_energy_equivalence_STR.html", title: "E = mc²", desc: "Mass–energy equivalence and binding energy in nuclear reactions." },
      { file: "old_sims/Michelson_Morley_2_STR.html", title: "Michelson–Morley Experiment", desc: "The null result that helped overturn the luminiferous ether." },
      { file: "old_sims/Relativistic_velocity_addition_STR.html", title: "Relativistic Velocity Addition", desc: "Velocities don't simply add at high speed — use the relativistic formula." },
      { file: "old_sims/Simultaneity_principle_STR.html", title: "Relativity of Simultaneity", desc: "Einstein's train thought experiment — simultaneous events depend on the observer." },
      { file: "old_sims/Time_dilation_STR.html", title: "Time Dilation", desc: "Moving clocks tick slower relative to a stationary observer." },
      { file: "old_sims/Time_dilation_refined_1.html", title: "Time Dilation (Refined 1)", desc: "Refined visualization of relativistic time dilation." },
      { file: "old_sims/Time_dilation_refined_2.html", title: "Time Dilation (Refined 2)", desc: "Second refined take on time dilation effects." },
      { file: "old_sims/Twin_Paradox_STR.html", title: "Twin Paradox", desc: "One twin travels near c and returns younger — resolved with proper time." },
      { file: "old_sims/Twin_paradox_STR_sim_2.html", title: "Twin Paradox (Alt)", desc: "Alternate twin paradox simulation with spacetime diagrams." },
    ];

    const simsV2 = [
      { file: "new_sims/cartesian_coordinates.html", title: "Cartesian Invariance", desc: "Translate and rotate a coordinate frame over fixed stars — a precursor to special relativity." },
      { file: "new_sims/Geometry.html", title: "Invariants of Geometry", desc: "Two surveyors, rotated grids — coordinate readings change, distances and angles do not." },
      { file: "new_sims/Polar_coordinates.html", title: "Polar vs Cartesian Motion", desc: "Uniform circular motion in polar and Cartesian coordinates side by side." },
      { file: "new_sims/Time_dilation_v1.html", title: "Muon Time Dilation", desc: "Cosmic-ray muons survive to the ground — a real-world proof of time dilation." },
      { file: "new_sims/Length_contraction_v1.html", title: "Length Contraction", desc: "Watch a rod near the speed of light — measured length shrinks along motion." },
    ];

    function renderCards(sims, gridId) {
      const grid = document.getElementById(gridId);
      sims.forEach(sim => {
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <h3>${sim.title}</h3>
          <p>${sim.desc}</p>
          <div class="actions">
            <a class="btn" href="./${sim.file}">Open simulation →</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    const mainEl = document.getElementById('main');

    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      mainEl.classList.toggle('mode-landing', viewId === 'view-landing');
      window.scrollTo(0, 0);
    }

    document.querySelectorAll('.version-box, .back-link').forEach(el => {
      el.addEventListener('click', () => showView(el.dataset.target));
    });

    document.getElementById('v1-count').textContent = `${simsV1.length} simulations`;
    document.getElementById('v2-count').textContent = `${simsV2.length} simulations`;

    renderCards(simsV1, 'grid-v1');
    renderCards(simsV2, 'grid-v2');
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
