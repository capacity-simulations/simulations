<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Twin Paradox Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #0a0e1a; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #e2e8f0;
        }
        
        .control-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            display: flex;
            align-items: center;
            padding: 0 25px;
            gap: 40px;
            z-index: 1000;
        }
        
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
            white-space: nowrap;
        }
        
        .stat-group {
            display: flex;
            gap: 25px;
            font-size: 13px;
        }
        
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .stat-label {
            color: #64748b;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            color: #f1f5f9;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            font-size: 14px;
        }
        
        .stat-value.earth { color: #60a5fa; }
        .stat-value.traveler { color: #f472b6; }
        .stat-value.velocity { color: #34d399; }
        
        .controls {
            display: flex;
            gap: 20px;
            margin-left: auto;
            align-items: center;
        }
        
        .control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        
        .control label {
            color: #94a3b8;
            white-space: nowrap;
        }
        
        .slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(148, 163, 184, 0.2);
            border-radius: 2px;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        
        .btn {
            padding: 8px 16px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        
        .btn.secondary {
            background: rgba(148, 163, 184, 0.2);
        }
        
        .btn.secondary:hover {
            background: rgba(148, 163, 184, 0.3);
        }
        
        #canvas-container {
            position: fixed;
            top: 70px;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 20px;
            width: 280px;
            font-size: 12px;
        }
        
        .info-panel h3 {
            font-size: 14px;
            margin-bottom: 15px;
            color: #f1f5f9;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .twin-comparison {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        
        .twin {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: rgba(148, 163, 184, 0.05);
            border-radius: 8px;
        }
        
        .twin-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .twin-name {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .twin-age {
            font-size: 20px;
            font-weight: 700;
        }
        
        .twin.earth .twin-age { color: #60a5fa; }
        .twin.traveler .twin-age { color: #f472b6; }
        
        .age-diff {
            text-align: center;
            padding: 10px;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1), rgba(244, 114, 182, 0.1));
            border-radius: 8px;
        }
        
        .age-diff-label {
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .age-diff-value {
            font-size: 18px;
            font-weight: 700;
            color: #fbbf24;
        }
        
        .graph-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 12px;
            padding: 15px;
            width: 300px;
        }
        
        .graph-panel h4 {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            font-size: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .legend-dot.earth { background: #60a5fa; }
        .legend-dot.traveler { background: #f472b6; }
        
        .phase-indicator {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 14, 26, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 12px;
            color: #94a3b8;
            z-index: 100;
        }
        
        .phase-indicator .phase {
            color: #fbbf24;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="control-bar">
        <div class="title">⏱️ Twin Paradox</div>
        
        <div class="stat-group">
            <div class="stat">
                <span class="stat-label">Earth Twin Age</span>
                <span class="stat-value earth" id="earthAge">20.0 yrs</span>
            </div>
            <div class="stat">
                <span class="stat-label">Traveler Age</span>
                <span class="stat-value traveler" id="travelerAge">20.0 yrs</span>
            </div>
            <div class="stat">
                <span class="stat-label">Velocity</span>
                <span class="stat-value velocity" id="velocity">0.00c</span>
            </div>
            <div class="stat">
                <span class="stat-label">γ Factor</span>
                <span class="stat-value" id="gamma">1.00</span>
            </div>
        </div>
        
        <div class="controls">
            <div class="control">
                <label>Max Speed (c):</label>
                <input type="range" class="slider" id="speedSlider" min="0.1" max="0.99" step="0.01" value="0.8">
                <span id="speedValue">0.80c</span>
            </div>
            <div class="control">
                <label>Journey (ly):</label>
                <input type="range" class="slider" id="distanceSlider" min="1" max="20" step="1" value="10">
                <span id="distanceValue">10 ly</span>
            </div>
            <button class="btn" id="startBtn">Start Journey</button>
            <button class="btn secondary" id="resetBtn">Reset</button>
        </div>
    </div>
    
    <div class="phase-indicator">
        Phase: <span class="phase" id="phaseText">Waiting to Launch</span>
    </div>
    
    <div id="canvas-container">
        <canvas id="mainCanvas"></canvas>
    </div>
    
    <div class="info-panel">
        <h3>👥 Twin Comparison</h3>
        <div class="twin-comparison">
            <div class="twin earth">
                <div class="twin-icon">🌍</div>
                <div class="twin-name">Earth Twin</div>
                <div class="twin-age" id="earthTwinAge">20</div>
            </div>
            <div class="twin traveler">
                <div class="twin-icon">🚀</div>
                <div class="twin-name">Traveler</div>
                <div class="twin-age" id="travelerTwinAge">20</div>
            </div>
        </div>
        <div class="age-diff">
            <div class="age-diff-label">Age Difference</div>
            <div class="age-diff-value" id="ageDiff">0 years</div>
        </div>
    </div>
    
    <div class="graph-panel">
        <h4>Age Over Time</h4>
        <canvas id="graphCanvas" width="270" height="120"></canvas>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot earth"></div>
                <span>Earth Twin</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot traveler"></div>
                <span>Traveling Twin</span>
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const graphCtx = graphCanvas.getContext('2d');
        
        let width, height;
        
        function resize() {
            width = canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            height = canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        
        resize();
        window.addEventListener('resize', resize);
        
        // Simulation state
        let state = {
            running: false,
            phase: 'waiting', // waiting, outbound, turnaround, inbound, complete
            time: 0,
            earthAge: 20,
            travelerAge: 20,
            maxSpeed: 0.8,
            journeyDistance: 10, // light years
            shipX: 0,
            shipY: 0,
            currentVelocity: 0,
            gamma: 1,
            ageHistory: { earth: [20], traveler: [20] },
            stars: [],
            particles: []
        };
        
        // Generate stars
        function generateStars() {
            state.stars = [];
            for (let i = 0; i < 200; i++) {
                state.stars.push({
                    x: Math.random() * 2000 - 500,
                    y: Math.random() * 1000 - 200,
                    size: Math.random() * 2 + 0.5,
                    brightness: Math.random() * 0.5 + 0.5
                });
            }
        }
        generateStars();
        
        // UI Elements
        const speedSlider = document.getElementById('speedSlider');
        const distanceSlider = document.getElementById('distanceSlider');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        speedSlider.addEventListener('input', (e) => {
            state.maxSpeed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = state.maxSpeed.toFixed(2) + 'c';
        });
        
        distanceSlider.addEventListener('input', (e) => {
            state.journeyDistance = parseInt(e.target.value);
            document.getElementById('distanceValue').textContent = state.journeyDistance + ' ly';
        });
        
        startBtn.addEventListener('click', () => {
            if (!state.running && state.phase === 'waiting') {
                state.running = true;
                state.phase = 'outbound';
                startBtn.textContent = 'In Progress...';
                startBtn.disabled = true;
            }
        });
        
        resetBtn.addEventListener('click', () => {
            state.running = false;
            state.phase = 'waiting';
            state.time = 0;
            state.earthAge = 20;
            state.travelerAge = 20;
            state.shipX = 0;
            state.currentVelocity = 0;
            state.gamma = 1;
            state.ageHistory = { earth: [20], traveler: [20] };
            state.particles = [];
            startBtn.textContent = 'Start Journey';
            startBtn.disabled = false;
            updateUI();
        });
        
        function calculateGamma(v) {
            return 1 / Math.sqrt(1 - v * v);
        }
        
        function updateSimulation(dt) {
            if (!state.running) return;
            
            const realDt = dt * 2; // Speed up simulation
            const accel = 0.5; // Acceleration rate
            
            switch (state.phase) {
                case 'outbound':
                    // Accelerate to max speed
                    if (state.currentVelocity < state.maxSpeed) {
                        state.currentVelocity = Math.min(state.currentVelocity + accel * realDt * 0.1, state.maxSpeed);
                    }
                    state.shipX += state.currentVelocity * realDt * 0.5;
                    
                    if (state.shipX >= state.journeyDistance) {
                        state.phase = 'turnaround';
                        state.turnaroundTime = 0;
                    }
                    break;
                    
                case 'turnaround':
                    state.turnaroundTime += realDt;
                    state.currentVelocity *= 0.95;
                    if (state.turnaroundTime > 0.5) {
                        state.phase = 'inbound';
                    }
                    break;
                    
                case 'inbound':
                    if (state.currentVelocity < state.maxSpeed) {
                        state.currentVelocity = Math.min(state.currentVelocity + accel * realDt * 0.1, state.maxSpeed);
                    }
                    state.shipX -= state.currentVelocity * realDt * 0.5;
                    
                    if (state.shipX <= 0) {
                        state.shipX = 0;
                        state.phase = 'complete';
                        state.running = false;
                        state.currentVelocity = 0;
                        startBtn.textContent = 'Journey Complete';
                    }
                    break;
            }
            
            // Calculate time dilation
            state.gamma = calculateGamma(state.currentVelocity);
            
            // Age both twins
            state.earthAge += realDt;
            state.travelerAge += realDt / state.gamma;
            
            // Record history for graph
            if (state.time % 0.1 < realDt) {
                state.ageHistory.earth.push(state.earthAge);
                state.ageHistory.traveler.push(state.travelerAge);
                if (state.ageHistory.earth.length > 100) {
                    state.ageHistory.earth.shift();
                    state.ageHistory.traveler.shift();
                }
            }
            
            state.time += realDt;
            
            // Add engine particles
            if (state.currentVelocity > 0.1 && Math.random() > 0.5) {
                const screenW = width / window.devicePixelRatio;
                const screenH = height / window.devicePixelRatio;
                const earthX = 150;
                const destX = screenW - 150;
                const shipScreenX = earthX + (state.shipX / state.journeyDistance) * (destX - earthX);
                const shipScreenY = screenH / 2;
                
                const direction = state.phase === 'inbound' ? 1 : -1;
                for (let i = 0; i < 3; i++) {
                    state.particles.push({
                        x: shipScreenX + direction * 20,
                        y: shipScreenY + (Math.random() - 0.5) * 10,
                        vx: direction * (Math.random() * 3 + 2),
                        vy: (Math.random() - 0.5) * 2,
                        life: 1,
                        color: Math.random() > 0.5 ? '#f472b6' : '#60a5fa'
                    });
                }
            }
        }
        
        function updateParticles(dt) {
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= dt * 2;
                if (p.life <= 0) {
                    state.particles.splice(i, 1);
                }
            }
        }
        
        function updateUI() {
            document.getElementById('earthAge').textContent = state.earthAge.toFixed(1) + ' yrs';
            document.getElementById('travelerAge').textContent = state.travelerAge.toFixed(1) + ' yrs';
            document.getElementById('velocity').textContent = state.currentVelocity.toFixed(2) + 'c';
            document.getElementById('gamma').textContent = state.gamma.toFixed(2);
            document.getElementById('earthTwinAge').textContent = Math.floor(state.earthAge);
            document.getElementById('travelerTwinAge').textContent = Math.floor(state.travelerAge);
            document.getElementById('ageDiff').textContent = (state.earthAge - state.travelerAge).toFixed(1) + ' years';
            
            const phases = {
                'waiting': 'Waiting to Launch',
                'outbound': 'Outbound Journey 🚀→',
                'turnaround': 'Turnaround Point 🔄',
                'inbound': '←🚀 Return Journey',
                'complete': 'Journey Complete ✓'
            };
            document.getElementById('phaseText').textContent = phases[state.phase];
        }
        
        function drawStars() {
            const screenW = width / window.devicePixelRatio;
            
            state.stars.forEach(star => {
                let x = star.x;
                // Parallax effect based on ship position
                if (state.running || state.phase === 'complete') {
                    x -= state.shipX * 10 * (star.size / 2);
                }
                x = ((x % (screenW + 500)) + screenW + 500) % (screenW + 500) - 250;
                
                ctx.beginPath();
                ctx.arc(x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness * 0.7})`;
                ctx.fill();
            });
        }
        
        function drawScene() {
            const screenW = width / window.devicePixelRatio;
            const screenH = height / window.devicePixelRatio;
            
            // Clear canvas
            ctx.fillStyle = '#0a0e1a';
            ctx.fillRect(0, 0, screenW, screenH);
            
            // Draw stars
            drawStars();
            
            // Draw journey path
            const earthX = 150;
            const destX = screenW - 150;
            const pathY = screenH / 2;
            
            // Path line
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(earthX, pathY);
            ctx.lineTo(destX, pathY);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Distance markers
            ctx.fillStyle = '#64748b';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'center';
            for (let i = 0; i <= state.journeyDistance; i += 2) {
                const x = earthX + (i / state.journeyDistance) * (destX - earthX);
                ctx.fillText(i + ' ly', x, pathY + 40);
                ctx.fillRect(x - 1, pathY + 20, 2, 10);
            }
            
            // Draw Earth
            const earthGradient = ctx.createRadialGradient(earthX, pathY, 0, earthX, pathY, 35);
            earthGradient.addColorStop(0, '#60a5fa');
            earthGradient.addColorStop(0.5, '#3b82f6');
            earthGradient.addColorStop(1, '#1e40af');
            
            ctx.beginPath();
            ctx.arc(earthX, pathY, 35, 0, Math.PI * 2);
            ctx.fillStyle = earthGradient;
            ctx.fill();
            
            // Earth glow
            ctx.beginPath();
            ctx.arc(earthX, pathY, 45, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Earth label
            ctx.fillStyle = '#60a5fa';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText('EARTH', earthX, pathY + 65);
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('Earth Twin stays here', earthX, pathY + 80);
            
            // Draw destination star
            const destGradient = ctx.createRadialGradient(destX, pathY, 0, destX, pathY, 25);
            destGradient.addColorStop(0, '#fbbf24');
            destGradient.addColorStop(0.5, '#f59e0b');
            destGradient.addColorStop(1, '#d97706');
            
            ctx.beginPath();
            ctx.arc(destX, pathY, 25, 0, Math.PI * 2);
            ctx.fillStyle = destGradient;
            ctx.fill();
            
            // Star glow
            ctx.beginPath();
            ctx.arc(destX, pathY, 35, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(251, 191, 36, 0.3)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // Destination label
            ctx.fillStyle = '#fbbf24';
            ctx.font = 'bold 12px sans-serif';
            ctx.fillText('DESTINATION', destX, pathY + 55);
            ctx.font = '10px sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText(state.journeyDistance + ' light years away', destX, pathY + 70);
            
            // Draw particles
            state.particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color.replace(')', `, ${p.life})`);
                ctx.fill();
            });
            
            // Draw spaceship
            const shipX = earthX + (state.shipX / state.journeyDistance) * (destX - earthX);
            const shipY = pathY;
            
            ctx.save();
            ctx.translate(shipX, shipY);
            
            // Ship direction
            if (state.phase === 'inbound') {
                ctx.scale(-1, 1);
            }
            
            // Ship body
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-15, -10);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-15, 10);
            ctx.closePath();
            
            const shipGradient = ctx.createLinearGradient(-15, 0, 20, 0);
            shipGradient.addColorStop(0, '#64748b');
            shipGradient.addColorStop(0.5, '#94a3b8');
            shipGradient.addColorStop(1, '#f472b6');
            ctx.fillStyle = shipGradient;
            ctx.fill();
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Engine glow
            if (state.currentVelocity > 0.1) {
                const glowSize = 10 + state.currentVelocity * 15;
                const engineGlow = ctx.createRadialGradient(-15, 0, 0, -15, 0, glowSize);
                engineGlow.addColorStop(0, 'rgba(244, 114, 182, 0.8)');
                engineGlow.addColorStop(0.5, 'rgba(244, 114, 182, 0.3)');
                engineGlow.addColorStop(1, 'rgba(244, 114, 182, 0)');
                ctx.beginPath();
                ctx.arc(-15, 0, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = engineGlow;
                ctx.fill();
            }
            
            ctx.restore();
            
            // Ship label
            ctx.fillStyle = '#f472b6';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('TRAVELER', shipX, shipY - 30);
            
            // Draw time dilation visualization
            drawTimeDilation(screenW, screenH);
        }
        
        function drawTimeDilation(screenW, screenH) {
            const boxWidth = 150;
            const boxHeight = 80;
            const earthBoxX = 50;
            const travelerBoxX = screenW - 200;
            const boxY = 50;
            
            // Earth clock
            ctx.fillStyle = 'rgba(96, 165, 250, 0.1)';
            ctx.strokeStyle = 'rgba(96, 165, 250, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(earthBoxX, boxY, boxWidth, boxHeight, 8);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#60a5fa';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Earth Clock', earthBoxX + boxWidth/2, boxY + 20);
            
            // Earth clock face
            const earthClockX = earthBoxX + boxWidth/2;
            const earthClockY = boxY + 50;
            ctx.beginPath();
            ctx.arc(earthClockX, earthClockY, 18, 0, Math.PI * 2);
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Earth clock hand
            const earthAngle = (state.earthAge * Math.PI / 5) - Math.PI/2;
            ctx.beginPath();
            ctx.moveTo(earthClockX, earthClockY);
            ctx.lineTo(earthClockX + Math.cos(earthAngle) * 14, earthClockY + Math.sin(earthAngle) * 14);
            ctx.strokeStyle = '#60a5fa';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Traveler clock
            ctx.fillStyle = 'rgba(244, 114, 182, 0.1)';
            ctx.strokeStyle = 'rgba(244, 114, 182, 0.3)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.roundRect(travelerBoxX, boxY, boxWidth, boxHeight, 8);
            ctx.fill();
            ctx.stroke();
            
            ctx.fillStyle = '#f472b6';
            ctx.font = 'bold 11px sans-serif';
            ctx.fillText('Traveler Clock', travelerBoxX + boxWidth/2, boxY + 20);
            
            // Traveler clock face
            const travelerClockX = travelerBoxX + boxWidth/2;
            const travelerClockY = boxY + 50;
            ctx.beginPath();
            ctx.arc(travelerClockX, travelerClockY, 18, 0, Math.PI * 2);
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Traveler clock hand (slower)
            const travelerAngle = (state.travelerAge * Math.PI / 5) - Math.PI/2;
            ctx.beginPath();
            ctx.moveTo(travelerClockX, travelerClockY);
            ctx.lineTo(travelerClockX + Math.cos(travelerAngle) * 14, travelerClockY + Math.sin(travelerAngle) * 14);
            ctx.strokeStyle = '#f472b6';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Gamma indicator
            if (state.gamma > 1.01) {
                ctx.fillStyle = '#34d399';
                ctx.font = '10px sans-serif';
                ctx.fillText(`γ = ${state.gamma.toFixed(2)}`, travelerClockX, travelerClockY + 35);
                ctx.fillText('(time slowed)', travelerClockX, travelerClockY + 47);
            }
        }
        
        function drawGraph() {
            const w = 270;
            const h = 120;
            
            graphCtx.fillStyle = 'rgba(15, 23, 42, 0.5)';
            graphCtx.fillRect(0, 0, w, h);
            
            // Grid
            graphCtx.strokeStyle = 'rgba(148, 163, 184, 0.1)';
            graphCtx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = (i / 4) * h;
                graphCtx.beginPath();
                graphCtx.moveTo(0, y);
                graphCtx.lineTo(w, y);
                graphCtx.stroke();
            }
            
            if (state.ageHistory.earth.length < 2) return;
            
            const minAge = 20;
            const maxAge = Math.max(...state.ageHistory.earth, ...state.ageHistory.traveler) + 5;
            const range = maxAge - minAge;
            
            // Draw Earth line
            graphCtx.beginPath();
            graphCtx.strokeStyle = '#60a5fa';
            graphCtx.lineWidth = 2;
            state.ageHistory.earth.forEach((age, i) => {
                const x = (i / (state.ageHistory.earth.length - 1)) * w;
                const y = h - ((age - minAge) / range) * h;
                if (i === 0) graphCtx.moveTo(x, y);
                else graphCtx.lineTo(x, y);
            });
            graphCtx.stroke();
            
            // Draw Traveler line
            graphCtx.beginPath();
            graphCtx.strokeStyle = '#f472b6';
            graphCtx.lineWidth = 2;
            state.ageHistory.traveler.forEach((age, i) => {
                const x = (i / (state.ageHistory.traveler.length - 1)) * w;
                const y = h - ((age - minAge) / range) * h;
                if (i === 0) graphCtx.moveTo(x, y);
                else graphCtx.lineTo(x, y);
            });
            graphCtx.stroke();
            
            // Y-axis labels
            graphCtx.fillStyle = '#64748b';
            graphCtx.font = '9px sans-serif';
            graphCtx.textAlign = 'left';
            graphCtx.fillText(maxAge.toFixed(0) + ' yrs', 5, 12);
            graphCtx.fillText(minAge + ' yrs', 5, h - 5);
        }
        
        let lastTime = 0;
        function animate(currentTime) {
            const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
            lastTime = currentTime;
            
            updateSimulation(dt);
            updateParticles(dt);
            updateUI();
            drawScene();
            drawGraph();
            
            requestAnimationFrame(animate);
        }
        
        requestAnimationFrame(animate);
    </script>
</body>
</html>
